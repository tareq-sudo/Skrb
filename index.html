<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مكتبة سكربتاتي</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0a1e;
      --surface: #1a1030;
      --surface2: #221540;
      --border: #3d2a6e;
      --accent: #a855f7;
      --accent2: #7c3aed;
      --accent3: #c084fc;
      --text: #f0e6ff;
      --text2: #b39ddb;
      --text3: #7e6fa8;
      --red: #f43f5e;
      --green: #10b981;
      --blue: #3b82f6;
      --gold: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, #4c1d9520, transparent),
        radial-gradient(ellipse 60% 40% at 80% 80%, #7c3aed10, transparent);
    }

    header {
      background: rgba(26, 16, 48, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 58px;
    }

    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { font-size: 22px; }
    .logo-text {
      font-size: 18px;
      font-weight: 800;
      background: linear-gradient(135deg, #c084fc, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .new-btn {
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 9px 20px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px #a855f740;
      transition: all .2s;
    }
    .new-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px #a855f760; }

    .back-btn {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 18px;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      transition: all .2s;
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent3); }

    .container { max-width: 700px; margin: 0 auto; padding: 20px 16px; }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, var(--surface2), var(--surface));
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 13px 30px;
      font-size: 15px;
      z-index: 999;
      box-shadow: 0 8px 32px #0008, 0 0 0 1px #a855f720;
      display: none;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 14px;
      border: 1.5px solid var(--border);
      font-size: 15px;
      font-family: inherit;
      direction: rtl;
      margin-bottom: 12px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px #a855f715; }
    .search-input::placeholder { color: var(--text3); }

    .pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }

    .pill {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all .2s;
    }
    .pill:hover { border-color: var(--accent); color: var(--accent3); }
    .pill.active {
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 4px 14px #a855f740;
    }

    .stats-row {
      display: flex;
      gap: 10px;
      margin-bottom: 22px;
      overflow-x: auto;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 20px;
      text-align: center;
      min-width: 72px;
      flex-shrink: 0;
    }

    .stat-num {
      display: block;
      font-size: 24px;
      font-weight: 900;
      background: linear-gradient(135deg, #c084fc, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-label { display: block; font-size: 11px; color: var(--text3); margin-top: 2px; }

    .empty { text-align: center; padding: 70px 20px; color: var(--text3); }
    .empty-icon { font-size: 52px; margin-bottom: 14px; }
    .empty-text { font-size: 16px; margin-bottom: 22px; color: var(--text2); }
    .empty-btn {
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 13px 30px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px #a855f740;
    }

    .grid { display: flex; flex-direction: column; gap: 12px; }

    .card {
      background: var(--surface);
      border-radius: 18px;
      padding: 18px;
      cursor: pointer;
      border: 1.5px solid var(--border);
      transition: all .25s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 80px; height: 80px;
      background: radial-gradient(circle, #a855f710, transparent 70%);
      border-radius: 0 18px 0 80px;
    }
    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 8px 32px #a855f720;
      transform: translateY(-2px);
    }

    .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }

    .platform-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .cat-badge {
      font-size: 11px;
      background: #a855f715;
      color: var(--accent3);
      border: 1px solid #a855f730;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .date-text { font-size: 11px; color: var(--text3); margin-right: auto; }
    .card-title { font-size: 17px; font-weight: 800; margin-bottom: 7px; color: var(--text); }
    .card-hook { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 10px; }
    .card-footer { border-top: 1px solid var(--border); padding-top: 9px; }
    .word-count { font-size: 11px; color: var(--text3); }

    .form-wrap {
      background: var(--surface);
      border-radius: 22px;
      padding: 24px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 40px #00000040;
    }

    .form-title {
      font-size: 21px;
      font-weight: 800;
      margin-bottom: 22px;
      background: linear-gradient(135deg, #c084fc, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text2);
      margin-bottom: 7px;
      margin-top: 16px;
    }

    input[type="text"], select, textarea {
      width: 100%;
      padding: 11px 15px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      font-size: 15px;
      font-family: inherit;
      direction: rtl;
      background: var(--surface2);
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }
    input[type="text"]:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px #a855f715;
    }
    input::placeholder, textarea::placeholder { color: var(--text3); }

    select option { background: var(--surface2); color: var(--text); }

    textarea {
      resize: none;
      line-height: 1.7;
      font-size: 14px;
      overflow: hidden;
      min-height: 80px;
    }

    .row2 { display: flex; gap: 12px; }
    .row2 > div { flex: 1; }

    .form-actions { display: flex; gap: 10px; margin-top: 26px; justify-content: flex-end; flex-wrap: wrap; }

    .cancel-btn {
      padding: 12px 22px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      transition: all .2s;
    }
    .cancel-btn:hover { border-color: var(--accent); color: var(--accent3); }

    .save-btn {
      padding: 12px 26px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px #a855f740;
      transition: all .2s;
    }
    .save-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px #a855f760; }

    .delete-btn {
      padding: 12px 20px;
      border-radius: 12px;
      border: 1.5px solid #f43f5e30;
      background: #f43f5e10;
      color: #f43f5e;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      transition: all .2s;
    }
    .delete-btn:hover { background: #f43f5e20; border-color: #f43f5e60; }

    .edit-btn {
      padding: 12px 26px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px #a855f740;
      transition: all .2s;
    }
    .edit-btn:hover { transform: translateY(-1px); }

    .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .detail-date { font-size: 12px; color: var(--text3); }
    .detail-title {
      font-size: 23px;
      font-weight: 800;
      margin-bottom: 22px;
      color: var(--text);
      line-height: 1.4;
    }

    .section {
      border-radius: 14px;
      border: 1.5px solid;
      padding: 14px 18px;
      margin-bottom: 12px;
      background: var(--surface2);
    }

    .section-label { font-size: 12px; font-weight: 800; margin-bottom: 8px; }
    .section-text { font-size: 15px; line-height: 1.9; color: var(--text2); white-space: pre-wrap; }

    .hidden { display: none; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent2); }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">🎬</span>
      <span class="logo-text">مكتبة سكربتاتي</span>
    </div>
    <button class="new-btn" id="newBtn" onclick="openForm(null)">+ سكربت جديد</button>
    <button class="back-btn hidden" id="backBtn" onclick="showView('list')">→ الرجوع</button>
  </div>
</header>

<div class="container">

  <!-- LIST VIEW -->
  <div id="listView">
    <input class="search-input" id="searchInput" placeholder="🔍 دور على سكربت..." oninput="renderList()" />
    <div class="pills" id="pills"></div>
    <div class="stats-row" id="statsRow"></div>
    <div class="grid" id="grid"></div>
  </div>

  <!-- FORM VIEW -->
  <div id="formView" class="hidden">
    <div class="form-wrap">
      <div class="form-title" id="formTitle">✨ سكربت جديد</div>

      <label>العنوان</label>
      <input type="text" id="fTitle" placeholder="اسم الفيديو أو الموضوع..." />

      <div class="row2">
        <div>
          <label>المنصة</label>
          <select id="fPlatform">
            <option>شورتس</option>
            <option>ريلز</option>
            <option>تيك توك</option>
            <option>يوتيوب</option>
          </select>
        </div>
        <div>
          <label>التصنيف</label>
          <select id="fCategory">
            <option>تقني</option>
            <option>تعليمي</option>
            <option>ترفيهي</option>
            <option>نصائح</option>
          </select>
        </div>
      </div>

      <label>🔴 Hook — الخطاف (0-3 ثواني)</label>
      <textarea id="fHook" placeholder="الجملة الأولى اللي تجذب المشاهد..."></textarea>

      <label>📦 Value — المحتوى</label>
      <textarea id="fValue" placeholder="الخطوات أو المعلومات..."></textarea>

      <label>🎯 Result — النتيجة</label>
      <textarea id="fResult" placeholder="شو بيصير بعد ما يطبق الشخص؟"></textarea>

      <label>📢 CTA — الدعوة للتفاعل</label>
      <textarea id="fCta" placeholder="احفظ، شير، كومنت..."></textarea>

      <div class="form-actions">
        <button class="cancel-btn" onclick="showView('list')">إلغاء</button>
        <button class="save-btn" onclick="saveScript()">💾 حفظ السكربت</button>
      </div>
    </div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="detailView" class="hidden">
    <div class="form-wrap">
      <div class="detail-header">
        <div id="dBadges"></div>
        <div class="detail-date" id="dDate"></div>
      </div>
      <div class="detail-title" id="dTitle"></div>
      <div id="dSections"></div>
      <div class="form-actions">
        <button class="delete-btn" onclick="deleteScript()">🗑️ حذف</button>
        <button class="edit-btn" onclick="openForm(currentScript)">✏️ تعديل</button>
      </div>
    </div>
  </div>

</div>

<script>
  const PLATFORM_COLORS = {
    "شورتس": "#f43f5e",
    "ريلز": "#e879f9",
    "تيك توك": "#94a3b8",
    "يوتيوب": "#f43f5e",
  };

  let scripts = [];
  let filterPlatform = "الكل";
  let currentScript = null;
  let editingId = null;

  function load() {
    try { scripts = JSON.parse(localStorage.getItem("scripts") || "[]"); }
    catch { scripts = []; }
  }

  function save() { localStorage.setItem("scripts", JSON.stringify(scripts)); }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.display = "block";
    setTimeout(() => t.style.display = "none", 2500);
  }

  function showView(view) {
    document.getElementById("listView").classList.toggle("hidden", view !== "list");
    document.getElementById("formView").classList.toggle("hidden", view !== "form");
    document.getElementById("detailView").classList.toggle("hidden", view !== "detail");
    document.getElementById("newBtn").classList.toggle("hidden", view !== "list");
    document.getElementById("backBtn").classList.toggle("hidden", view === "list");
    if (view === "list") renderList();
    if (view === "form") initAutoResize();
  }

  function initAutoResize() {
    setTimeout(() => {
      document.querySelectorAll("textarea").forEach(tx => {
        tx.style.height = "auto";
        tx.style.height = tx.scrollHeight + "px";
        tx.addEventListener("input", function () {
          this.style.height = "auto";
          this.style.height = this.scrollHeight + "px";
        });
      });
    }, 50);
  }

  function renderPills() {
    const pills = ["الكل", "شورتس", "ريلز", "تيك توك", "يوتيوب"];
    document.getElementById("pills").innerHTML = pills.map(p => `
      <button class="pill ${filterPlatform === p ? 'active' : ''}" onclick="setFilter('${p}')">${p}</button>
    `).join("");
  }

  function setFilter(p) { filterPlatform = p; renderList(); }

  function renderStats() {
    const platforms = ["شورتس", "ريلز", "تيك توك", "يوتيوب"];
    document.getElementById("statsRow").innerHTML = `
      <div class="stat">
        <span class="stat-num">${scripts.length}</span>
        <span class="stat-label">سكربت</span>
      </div>
      ${platforms.map(p => `
        <div class="stat">
          <span class="stat-num">${scripts.filter(s => s.platform === p).length}</span>
          <span class="stat-label">${p}</span>
        </div>
      `).join("")}
    `;
  }

  function wordCount(text) {
    return text.trim().split(/\s+/).filter(Boolean).length;
  }

  function renderList() {
    renderPills();
    renderStats();
    const search = document.getElementById("searchInput").value;
    const filtered = scripts.filter(s => {
      const matchSearch = !search || s.title.includes(search) || s.hook.includes(search) || s.value.includes(search);
      const matchPlatform = filterPlatform === "الكل" || s.platform === filterPlatform;
      return matchSearch && matchPlatform;
    });

    if (filtered.length === 0) {
      document.getElementById("grid").innerHTML = `
        <div class="empty">
          <div class="empty-icon">📝</div>
          <div class="empty-text">${scripts.length === 0 ? "ما عندك سكربتات بعد، ابدأ الحين!" : "ما لقينا نتائج"}</div>
          ${scripts.length === 0 ? `<button class="empty-btn" onclick="openForm(null)">+ أضف أول سكربت</button>` : ""}
        </div>
      `;
      return;
    }

    document.getElementById("grid").innerHTML = filtered.map(s => {
      const color = PLATFORM_COLORS[s.platform];
      const total = wordCount(s.hook + " " + s.value + " " + s.result + " " + s.cta);
      return `
        <div class="card" onclick="openDetail(${s.id})">
          <div class="card-top">
            <span class="platform-badge" style="background:${color}20;color:${color};border:1px solid ${color}40">${s.platform}</span>
            <span class="cat-badge">${s.category}</span>
            <span class="date-text">${s.date}</span>
          </div>
          <div class="card-title">${s.title}</div>
          ${s.hook ? `<div class="card-hook">🔴 ${s.hook.slice(0, 80)}${s.hook.length > 80 ? "..." : ""}</div>` : ""}
          <div class="card-footer">
            <span class="word-count">${total} كلمة</span>
          </div>
        </div>
      `;
    }).join("");
  }

  function openForm(script) {
    editingId = script ? script.id : null;
    document.getElementById("formTitle").textContent = script ? "✏️ تعديل السكربت" : "✨ سكربت جديد";
    document.getElementById("fTitle").value = script?.title || "";
    document.getElementById("fPlatform").value = script?.platform || "شورتس";
    document.getElementById("fCategory").value = script?.category || "تقني";
    document.getElementById("fHook").value = script?.hook || "";
    document.getElementById("fValue").value = script?.value || "";
    document.getElementById("fResult").value = script?.result || "";
    document.getElementById("fCta").value = script?.cta || "";
    showView("form");
  }

  function saveScript() {
    const title = document.getElementById("fTitle").value.trim();
    if (!title) return showToast("⚠️ حط عنوان للسكربت");

    const script = {
      id: editingId || Date.now(),
      title,
      platform: document.getElementById("fPlatform").value,
      category: document.getElementById("fCategory").value,
      hook: document.getElementById("fHook").value,
      value: document.getElementById("fValue").value,
      result: document.getElementById("fResult").value,
      cta: document.getElementById("fCta").value,
      date: editingId
        ? scripts.find(s => s.id === editingId)?.date
        : new Date().toLocaleDateString("ar-IQ"),
    };

    if (editingId) {
      scripts = scripts.map(s => s.id === editingId ? script : s);
    } else {
      scripts.unshift(script);
    }

    save();
    showToast("✅ تم الحفظ!");
    showView("list");
  }

  function openDetail(id) {
    currentScript = scripts.find(s => s.id === id);
    if (!currentScript) return;

    const color = PLATFORM_COLORS[currentScript.platform];
    document.getElementById("dBadges").innerHTML = `
      <span class="platform-badge" style="background:${color}20;color:${color};border:1px solid ${color}40">${currentScript.platform}</span>
      <span class="cat-badge" style="margin-right:8px">${currentScript.category}</span>
    `;
    document.getElementById("dDate").textContent = currentScript.date;
    document.getElementById("dTitle").textContent = currentScript.title;

    const sections = [
      { key: "hook", label: "🔴 Hook", color: "#f43f5e" },
      { key: "value", label: "📦 Value", color: "#3b82f6" },
      { key: "result", label: "🎯 Result", color: "#10b981" },
      { key: "cta", label: "📢 CTA", color: "#a855f7" },
    ];

    document.getElementById("dSections").innerHTML = sections
      .filter(s => currentScript[s.key])
      .map(s => `
        <div class="section" style="border-color:${s.color}40">
          <div class="section-label" style="color:${s.color}">${s.label}</div>
          <div class="section-text">${currentScript[s.key]}</div>
        </div>
      `).join("");

    showView("detail");
  }

  function deleteScript() {
    if (!currentScript) return;
    scripts = scripts.filter(s => s.id !== currentScript.id);
    save();
    showToast("🗑️ تم الحذف");
    currentScript = null;
    showView("list");
  }

  load();
  renderList();
</script>
</body>
</html>
